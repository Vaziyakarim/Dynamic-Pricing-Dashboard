<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dynamic Pricing Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN PROTECTION -->
<script>
if(!sessionStorage.getItem("adminLoggedIn")){
window.location.href="login.html";
}
</script>

<h1>Dynamic Pricing Dashboard</h1>

<div class="container">

<div class="nav-buttons">
<button onclick="location.href='add-product.html'">Add Product</button>

<button onclick="location.href='record-sale.html'">Record Sale</button>
<button onclick="location.href='revenue.html'">View Revenue</button>
<button onclick="location.href='charts.html'">Charts</button>
<button onclick="location.href='sales-history.html'">Sales History</button>
</div>


<!-- SEARCH + FILTER -->
<div style="margin-bottom:20px; display:flex; gap:10px;">

<input id="searchInput" placeholder="Search by name..." style="padding:10px;width:200px;">

<select id="filterStock" style="padding:10px;">
<option value="">Stock Filter</option>
<option value="low">Low Stock (&lt;10)</option>
<option value="high">High Stock (&ge;10)</option>
</select>

<select id="filterDemand" style="padding:10px;">
<option value="">Demand Filter</option>
<option value="low">Low Demand (&lt;10)</option>
<option value="high">High Demand (&ge;10)</option>
</select>

</div>


<!-- PRODUCT TABLE -->

<div class="card">

<h2 style="color:#d4af37;text-align:center;">All Products</h2>

<table id="productTable">

<thead>
<tr>
<th>S.No</th>
<th>Product ID</th>
<th>Name</th>
<th>Base Price</th>
<th>Dynamic Price</th>
<th>Stock</th>
<th>Demand</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="productTableBody"></tbody>

</table>

</div>

</div>


<!-- SUCCESS POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<h2 id="popupTitle">Success</h2>
<p id="popupMessage"></p>

<button onclick="closePopup()">OK</button>

</div>

</div>



<!-- EDIT POPUP -->

<div class="popup" id="editPopup">

<div class="popup-box">

<h2 style="color:gold;">Edit Product</h2>

<label>Base Price</label>
<input id="editBasePrice" type="number">

<label>Stock</label>
<input id="editStock" type="number">

<label>Demand</label>
<input id="editDemand" type="number">

<div style="margin-top:15px; display:flex; justify-content:space-between;">

<button class="nice-btn" onclick="closeEdit()">Cancel</button>
<button class="nice-btn" onclick="saveEdit()">Update</button>

</div>

</div>

</div>



<!-- DELETE POPUP -->

<div class="popup" id="deletePopup">

<div class="popup-box">

<h2 style="color:red;">Delete Product</h2>

<p id="deleteText" style="margin-bottom:20px;font-size:16px;"></p>

<div style="display:flex; justify-content:space-between;">

<button class="nice-btn" onclick="closeDelete()">Cancel</button>

<button class="nice-btn" style="background:red;color:white;border:none;"
onclick="confirmDelete()">
Delete
</button>

</div>

</div>

</div>

<div id="otpSection" style="display:none;margin-top:20px;">

<label>Enter OTP</label>
<input id="otp" type="text" placeholder="4 digit OTP">

<button onclick="verifyOtp()">Verify OTP</button>

</div>

<!-- LOGOUT BUTTON -->

<button onclick="logout()" class="logout-btn">Logout</button>


<script>

function logout(){

sessionStorage.removeItem("adminLoggedIn");

window.location.href="login.html";

}

</script>



<!-- MAIN SCRIPT -->

<script src="script.js"></script>

</body>
</html>
