<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:#111;
color:white;
font-family:Poppins,sans-serif;
}

.login-box{
width:350px;
margin:100px auto;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:14px;
border:1px solid gold;
box-shadow:0 0 15px gold;
}

.login-box h2{
text-align:center;
color:gold;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0 20px 0;
background:#222;
border:1px solid #444;
border-radius:8px;
color:white;
}

.login-btn{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:6px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<script>
if(sessionStorage.getItem("adminLoggedIn")){
window.location.href="index.html";
}
</script>

<div class="login-box">

<h2>Admin Login</h2>

<label>Username</label>
<input id="username" type="text" placeholder="Enter Username">

<label>Password</label>
<input id="password" type="password" placeholder="Enter Password">

<button class="login-btn" onclick="login()">Login</button>

</div>


<!-- OTP SECTION -->
<div id="otpSection" style="display:none;width:350px;margin:20px auto;">

<label>Enter OTP</label>
<input id="otp" type="text" placeholder="4 digit OTP">

<button class="login-btn" onclick="verifyOtp()">Verify OTP</button>

</div>


<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h2 id="popupTitle"></h2>
<p id="popupMessage"></p>
<button onclick="closePopup()">OK</button>
</div>
</div>
<script>


async function login(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

let res = await fetch("http://localhost:8080/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
});

let msg = await res.text();

if(msg === "OTP_SENT"){

document.getElementById("otpSection").style.display="block";

}
else{

showPopup("Error",msg);

}

}
async function verifyOtp(){

const otp = document.getElementById("otp").value;

let res = await fetch("http://localhost:8080/auth/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({otp})
});

let msg = await res.text();

if(msg === "SUCCESS"){

sessionStorage.setItem("adminLoggedIn","true");

window.location.href="index.html";

}
else{

showPopup("Error",msg);

}

}



function showPopup(title,message){

document.getElementById("popupTitle").innerText = title;
document.getElementById("popupMessage").innerText = message;
document.getElementById("popup").classList.add("active");

}

function closePopup(){

document.getElementById("popup").classList.remove("active");

}

</script>


</body>
</html>
